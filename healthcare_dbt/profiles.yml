healthcare_dbt:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'ACCOUNTADMIN') }}"
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'LAKEHOUSE_WH') }}"
      database: "{{ env_var('SNOWFLAKE_DATABASE', 'HEALTHCARE_LAKEHOUSE') }}"
      schema: SILVER
      threads: 4
      client_session_keep_alive: false
